<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BTPS Durga Puja Coupons</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: Arial, sans-serif;
        }

        body{
            background:
            linear-gradient(135deg,#fff8dc,#ffe4b5,#fff5ee);
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:20px;
            color:#7f1d1d;
        }

        .container{
            width:100%;
            max-width:650px;
            background:white;
            padding:30px;
            border-radius:22px;
            border:4px solid #dc2626;
            box-shadow:0 10px 35px rgba(220,38,38,0.2);
        }

        h1{
            text-align:center;
            margin-bottom:10px;
            font-size:32px;
            color:#b91c1c;
        }

        .subtitle{
            text-align:center;
            margin-bottom:25px;
            color:#92400e;
            font-weight:bold;
        }

        .input-group{
            margin-bottom:18px;
        }

        label{
            display:block;
            margin-bottom:8px;
            font-weight:bold;
            color:#991b1b;
        }

        input, select{
            width:100%;
            padding:12px;
            border:2px solid #fbbf24;
            border-radius:12px;
            outline:none;
            font-size:16px;
            background:#fffdf7;
        }

        input:focus,
        select:focus{
            border-color:#dc2626;
        }

        .price-box{
            margin-top:20px;
            background:#fef3c7;
            padding:15px;
            border-radius:12px;
            text-align:center;
            font-size:22px;
            font-weight:bold;
            color:#b45309;
            border:2px solid #f59e0b;
        }

        .payment-section{
            margin-top:20px;
            text-align:center;
            background:#fff7ed;
            padding:20px;
            border-radius:16px;
            border:2px dashed #dc2626;
        }

        .payment-section h2{
            color:#b91c1c;
            margin-bottom:15px;
        }

        .qr-image{
            width:220px;
            height:220px;
            object-fit:contain;
            margin-bottom:15px;
            border-radius:12px;
            border:3px solid #fbbf24;
            background:white;
            padding:10px;
        }

        .upi-box{
            margin-bottom:15px;
            background:#fef2f2;
            padding:12px;
            border-radius:10px;
            color:#991b1b;
            font-weight:bold;
        }

        .pay-btn{
            width:100%;
            padding:14px;
            border:none;
            border-radius:12px;
            background:#dc2626;
            color:white;
            font-size:18px;
            cursor:pointer;
            transition:0.3s;
            font-weight:bold;
        }

        .pay-btn:hover{
            background:#b91c1c;
        }

        .submit-btn{
            width:100%;
            margin-top:20px;
            padding:14px;
            border:none;
            border-radius:12px;
            background:#f59e0b;
            color:white;
            font-size:18px;
            cursor:pointer;
            font-weight:bold;
        }

        .submit-btn:hover{
            background:#d97706;
        }

        .success{
            margin-top:20px;
            text-align:center;
            color:#15803d;
            font-weight:bold;
        }

        table{
            width:100%;
            margin-top:25px;
            border-collapse:collapse;
            overflow:hidden;
            border-radius:14px;
        }

        th{
            background:#dc2626;
            color:white;
        }

        th, td{
            border:1px solid #fca5a5;
            padding:10px;
            text-align:center;
            font-size:14px;
            background:#fffdf7;
        }

    </style>

</head>

<body>

    <div class="container">

        <h1>BTPS Durga Puja Coupons</h1>

        <div class="subtitle">
            Official Coupon Booking Portal
        </div>

        <form id="couponForm">

            <div class="input-group">
                <label>1. Name</label>
                <input type="text" id="name" required>
            </div>

            <div class="input-group">
                <label>2. Employee Number</label>
                <input type="text" id="employee" required>
            </div>

            <div class="input-group">
                <label>3. No of Coupons</label>
                <input type="number" id="coupons" min="1" required>
            </div>

            <div class="input-group">
                <label>4. Veg or Non Veg Meal</label>

                <select id="meal" required>
                    <option value="">Select Meal</option>
                    <option value="Veg">Veg Meal - ₹200</option>
                    <option value="Non Veg">Non Veg Meal - ₹250</option>
                </select>
            </div>

            <div class="price-box">
                Total Amount: ₹<span id="total">0</span>
            </div>

            <div class="payment-section">

                <h2>Complete Payment</h2>

                <img 
                id="qrImage"
                src=""
                alt="UPI QR Code"
                class="qr-image">

                <div class="upi-box">
                    UPI ID: 9593476267@ibl
                </div>

                <a id="payNowBtn" href="#">
                    <button type="button" class="pay-btn">
                        Pay with PhonePe
                    </button>
                </a>

            </div>

            <button type="submit" class="submit-btn">
                Submit BTPS Durga Puja Coupon
            </button>

            <div class="success" id="successMsg"></div>

        </form>

        <table id="entryTable">

            <thead>
                <tr>
                    <th>Name</th>
                    <th>Employee No.</th>
                    <th>Coupons</th>
                    <th>Meal</th>
                    <th>Total</th>
                </tr>
            </thead>

            <tbody></tbody>

        </table>

    </div>

    <script>

        const scriptURL = "PASTE_YOUR_WEB_APP_URL_HERE";

        const couponsInput = document.getElementById("coupons");
        const mealInput = document.getElementById("meal");
        const totalSpan = document.getElementById("total");

        const upiID = "9593476267@ibl";
        const payeeName = "BTPS Durga Puja Coupons";

        function calculateTotal() {

            const coupons = parseInt(couponsInput.value) || 0;
            const meal = mealInput.value;

            let price = 0;

            if(meal === "Veg"){
                price = 200;
            }

            else if(meal === "Non Veg"){
                price = 250;
            }

            totalSpan.innerText = coupons * price;

            updatePaymentLink();
        }

        function updatePaymentLink(){

            const total = totalSpan.innerText || 0;

            const upiLink =
            `upi://pay?pa=${upiID}&pn=${encodeURIComponent(payeeName)}&am=${total}&cu=INR`;

            document.getElementById("payNowBtn")
            .href = upiLink;

            const qrURL =
            `https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=${encodeURIComponent(upiLink)}`;

            document.getElementById("qrImage")
            .src = qrURL;
        }

        couponsInput.addEventListener("input", calculateTotal);
        mealInput.addEventListener("change", calculateTotal);

        async function loadEntries(){

            try{

                const response = await fetch(scriptURL);

                const data = await response.json();

                const tableBody =
                document.querySelector("#entryTable tbody");

                tableBody.innerHTML = "";

                data.reverse().forEach(entry => {

                    const row = `
                        <tr>
                            <td>${entry.name}</td>
                            <td>${entry.employee}</td>
                            <td>${entry.coupons}</td>
                            <td>${entry.meal}</td>
                            <td>₹${entry.total}</td>
                        </tr>
                    `;

                    tableBody.innerHTML += row;
                });

            }

            catch(error){

                console.error("Error Loading Entries:", error);
            }
        }

        document.getElementById("couponForm")
        .addEventListener("submit", async function(e){

            e.preventDefault();

            const name = document.getElementById("name").value;
            const employee = document.getElementById("employee").value;
            const coupons = document.getElementById("coupons").value;
            const meal = document.getElementById("meal").value;
            const total = totalSpan.innerText;

            const data = {
                name: name,
                employee: employee,
                coupons: coupons,
                meal: meal,
                total: total
            };

            try {

                await fetch(scriptURL, {
                    method: "POST",
                    body: JSON.stringify(data)
                });

                document.getElementById("successMsg").innerHTML =
                "BTPS Durga Puja Coupon Submitted Successfully!";

                document.getElementById("couponForm").reset();

                totalSpan.innerText = "0";

                updatePaymentLink();

                loadEntries();

            }

            catch(error){

                document.getElementById("successMsg").innerHTML =
                "Error Submitting Form!";

                console.error(error);
            }

        });

        updatePaymentLink();

        loadEntries();

    </script>

</body>

</html>
